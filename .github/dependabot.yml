version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    groups:
      rust-deps:
        patterns:
          - "*"
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    groups:
      actions-deps:
        patterns:
          - "*"
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    groups:
      python-deps:
        patterns:
          - "*"
    commit-message:
      prefix: chore
      include: scope
